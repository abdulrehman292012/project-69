<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Step Review Form</title>
    <style>
        /* बेसिक रीसेट और सिंपल फॉन्ट */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
        }

        /* स्टेप्स इंडिकेटर बार */
        .step-indicator {
            display: flex;
            max-width: 600px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .step-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background-color: #d3d3d3; /* डिफ़ॉल्ट ग्रे रंग */
            color: #000;
        }
        .step-tab.active {
            background-color: #5b9bd5; /* एक्टिव स्टेप के लिए नीला रंग */
            color: #000;
        }
        .step-tab.completed {
            background-color: #a9d18e; /* पिछले पूरे हो चुके स्टेप्स के लिए हरा रंग */
            color: #000;
        }

        /* फॉर्म कंटेनर और फील्डसेट */
        .form-step {
            display: none; /* शुरुआत में सारे स्टेप्स छुपे रहेंगे */
            max-width: 600px;
        }
        .form-step.active {
            display: block; /* सिर्फ एक्टिव स्टेप दिखेगा */
        }
        fieldset {
            border: 1px solid #7f7f7f;
            padding: 20px;
        }
        legend {
            font-size: 1.2em;
            font-weight: bold;
            padding: 0 5px;
        }

        /* फॉर्म इनपुट्स की स्टाइलिंग */
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-group input[type="text"],
        .form-group input[type="password"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid #ccc;
        }
        .form-group textarea {
            height: 80px;
            resize: vertical;
        }
        
        /* CNIC इनपुट के छोटे बॉक्सेस */
        .cnic-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .cnic-box {
            width: 30px !important;
            text-align: center;
        }

        /* बटन लेआउट */
        .buttons-container {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        button {
            background-color: #003366; /* गहरा नीला रंग */
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button:hover {
            background-color: #002244;
        }
    </style>
</head>
<body>

    <div class="step-indicator" id="stepIndicator">
        <div class="step-tab active" id="tab1">Step 1: Account</div>
        <div class="step-tab" id="tab2">Step 2: Personal Details</div>
        <div class="step-tab" id="tab3">Step 3: Your Review</div>
    </div>

    <form id="multiStepForm" onsubmit="handleSubmit(event)">
        
        <div class="form-step active" id="step1">
            <fieldset>
                <legend>Account</legend>
                <div class="form-group">
                    <label>Email Address:</label>
                    <input type="text" placeholder="Enter Email" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" placeholder="Enter Password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password:</label>
                    <input type="password" placeholder="Confirm Password" required>
                </div>
                <div class="buttons-container">
                    <button type="button" onclick="nextStep(2)">Next ➔</button>
                </div>
            </fieldset>
        </div>

        <div class="form-step" id="step2">
            <fieldset>
                <legend>Personal Details</legend>
                <div class="form-group">
                    <label>First Name:</label>
                    <input type="text" placeholder="Enter First Name">
                </div>
                <div class="form-group">
                    <label>Last Name:</label>
                    <input type="text" placeholder="Enter Last Name">
                </div>
                <div class="form-group">
                    <label>CNIC:</label>
                    <div class="cnic-container">
                        <input type="text" class="cnic-box" maxlength="1">
                        <input type="text" class="cnic-box" maxlength="1">
                        <input type="text" class="cnic-box" maxlength="1">
                        <input type="text" class="cnic-box" maxlength="1">
                        <input type="text" class="cnic-box" maxlength="1">
                        -
                        <input type="text" class="cnic-box" maxlength="1">
                        <input type="text" class="cnic-box" maxlength="1">
                        <input type="text" class="cnic-box" maxlength="1">
                        <input type="text" class="cnic-box" maxlength="1">
                        <input type="text" class="cnic-box" maxlength="1">
                        <input type="text" class="cnic-box" maxlength="1">
                        <input type="text" class="cnic-box" maxlength="1">
                        -
                        <input type="text" class="cnic-box" maxlength="1">
                    </div>
                </div>
                <div class="form-group">
                    <label>Social Link:</label>
                    <input type="text" placeholder="Enter Facebook/Linkedin profile link">
                </div>
                <div class="buttons-container">
                    <button type="button" onclick="prevStep(1)">➔ Back</button>
                    <button type="button" onclick="nextStep(3)">Next ➔</button>
                </div>
            </fieldset>
        </div>

        <div class="form-step" id="step3">
            <fieldset>
                <legend>Your Review</legend>
                <div class="form-group">
                    <label>How did you hear about us?</label>
                    <select>
                        <option value="">Select your option</option>
                        <option value="social">Social Media</option>
                        <option value="friend">Friend</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Would you visit again?</label>
                    <input type="radio" name="visit" id="yes"> <label style="display:inline; font-weight:normal;" for="yes">Yes</label>
                    <input type="radio" name="visit" id="no"> <label style="display:inline; font-weight:normal;" for="no">No</label>
                    <input type="radio" name="visit" id="maybe"> <label style="display:inline; font-weight:normal;" for="maybe">Maybe</label>
                </div>
                <div class="form-group">
                    <label>Comments:</label>
                    <textarea placeholder="Enter your comments here..."></textarea>
                </div>
                <div class="form-group">
                    <label>Documents:</label>
                    <input type="file">
                </div>
                <div class="form-group">
                    <input type="checkbox" id="signup">
                    <label style="display:inline; font-weight:normal;" for="signup">Sign me up for email updates</label>
                </div>
                <div class="buttons-container">
                    <button type="button" onclick="prevStep(2)">➔ Back</button>
                    <button type="submit">Submit ➔</button>
                </div>
            </fieldset>
        </div>

    </form>

    <script>
        // अगले स्टेप पर जाने का फंक्शन
        function nextStep(stepNumber) {
            // सभी स्टेप्स को छुपाएं
            document.querySelectorAll('.form-step').forEach(step => step.classList.remove('active'));
            // करंट स्टेप को दिखाएं
            document.getElementById('step' + stepNumber).classList.add('active');
            
            // ऊपर के इंडिकेटर बार को अपडेट करना
            updateIndicator(stepNumber);
        }

        // पिछले स्टेप पर वापस आने का फंक्शन
        function prevStep(stepNumber) {
            document.querySelectorAll('.form-step').forEach(step => step.classList.remove('active'));
            document.getElementById('step' + stepNumber).classList.add('active');
            
            updateIndicator(stepNumber);
        }

        // इंडिकेटर बार के रंगों को बदलने का लॉजिक
        function updateIndicator(currentStep) {
            const tab1 = document.getElementById('tab1');
            const tab2 = document.getElementById('tab2');
            const tab3 = document.getElementById('tab3');

            // स्टेप 1 एक्टिविटी
            if (currentStep === 1) {
                tab1.className = "step-tab active";
                tab2.className = "step-tab";
                tab3.className = "step-tab";
            } 
            // स्टेप 2 एक्टिविटी (पहला स्टेप हरा हो जाएगा)
            else if (currentStep === 2) {
                tab1.className = "step-tab completed";
                tab2.className = "step-tab active";
                tab3.className = "step-tab";
            } 
            // स्टेप 3 एक्टिविटी (पहले दोनों स्टेप हरे हो जाएंगे)
            else if (currentStep === 3) {
                tab1.className = "step-tab completed";
                tab2.className = "step-tab completed";
                tab3.className = "step-tab active";
            }
        }

        // सबमिट होने पर done.html पर रीडायरेक्ट करने का फंक्शन
        function handleSubmit(event) {
            event.preventDefault(); // पेज को रीफ्रेश होने से रोकने के लिए
            window.location.href = "done.html"; // अपने आप यह फाइल खुल जाएगी
        }
    </script>

</body>
</html>
